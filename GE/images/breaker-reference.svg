    <text x="130" y="263" text-anchor="middle" fill="white" font-family="monospace" font-size="5" font-weight="bold">TRIP</text>
    <text x="85" y="400" text-anchor="middle" fill="#4A90D9" font-family="monospace" font-size="8">⑧ MECHANISM</text>
  </g>

