    <!-- Pole A -->
    <rect x="200" y="220" width="110" height="160" rx="3" fill="#2E4A2E" stroke="#4A7A5A" stroke-width="1.5"/>
    <rect x="215" y="230" width="12" height="140" rx="2" fill="#B87333" stroke="#8B5A2B" stroke-width="0.7"/>
    <rect x="215" y="230" width="55" height="10" rx="1" fill="#B87333" stroke="#8B5A2B" stroke-width="0.7"/>
    <ellipse cx="255" cy="310" rx="10" ry="5" fill="#D8D8D8" stroke="#C0C0C0" stroke-width="0.8"/>
    <text x="255" y="390" text-anchor="middle" fill="#4A7A5A" font-family="monospace" font-size="8">⑤ POLE A</text>

    <!-- Pole B -->
    <rect x="345" y="220" width="110" height="160" rx="3" fill="#2E4A2E" stroke="#4A7A5A" stroke-width="1.5"/>
    <rect x="360" y="230" width="12" height="140" rx="2" fill="#B87333" stroke="#8B5A2B" stroke-width="0.7"/>
    <rect x="360" y="230" width="55" height="10" rx="1" fill="#B87333" stroke="#8B5A2B" stroke-width="0.7"/>
    <ellipse cx="400" cy="310" rx="10" ry="5" fill="#D8D8D8" stroke="#C0C0C0" stroke-width="0.8"/>
    <text x="400" y="390" text-anchor="middle" fill="#4A7A5A" font-family="monospace" font-size="8">⑥ POLE B</text>

    <!-- Pole C -->
    <rect x="490" y="220" width="110" height="160" rx="3" fill="#2E4A2E" stroke="#4A7A5A" stroke-width="1.5"/>
    <rect x="505" y="230" width="12" height="140" rx="2" fill="#B87333" stroke="#8B5A2B" stroke-width="0.7"/>
    <rect x="505" y="230" width="55" height="10" rx="1" fill="#B87333" stroke="#8B5A2B" stroke-width="0.7"/>
    <ellipse cx="545" cy="310" rx="10" ry="5" fill="#D8D8D8" stroke="#C0C0C0" stroke-width="0.8"/>
    <text x="545" y="390" text-anchor="middle" fill="#4A7A5A" font-family="monospace" font-size="8">⑦ POLE C</text>
  </g>

  <!-- TRIP SHAFT -->
  <rect x="160" y="410" width="480" height="18" rx="9" fill="#C0C0C0" stroke="#4A90D9" stroke-width="1.5"/>
  <rect x="172" y="412" width="456" height="6" rx="3" fill="rgba(255,255,255,0.4)"/>
  <!-- Paddles -->
  <rect x="248" y="428" width="14" height="28" rx="2" fill="#B0B0B0" stroke="#888" stroke-width="0.9"/>
  <rect x="393" y="428" width="14" height="28" rx="2" fill="#B0B0B0" stroke="#888" stroke-width="0.9"/>
  <rect x="538" y="428" width="14" height="28" rx="2" fill="#B0B0B0" stroke="#888" stroke-width="0.9"/>
  <text x="400" y="465" text-anchor="middle" fill="#4A90D9" font-family="monospace" font-size="8">⑨ TRIP SHAFT</text>

  <!-- BACK FRAME (bottom) -->
  <rect x="100" y="480" width="600" height="100" rx="5" fill="#E8E4D8" stroke="#4A90D9" stroke-width="1.5"/>
  <!-- Pole bays -->
  <rect x="160" y="490" width="120" height="70" rx="2" fill="#D8D4C8" stroke="#B8B4A8" stroke-width="0.5"/>
  <rect x="340" y="490" width="120" height="70" rx="2" fill="#D8D4C8" stroke="#B8B4A8" stroke-width="0.5"/>
  <rect x="520" y="490" width="120" height="70" rx="2" fill="#D8D4C8" stroke="#B8B4A8" stroke-width="0.5"/>
  <text x="220" y="530" text-anchor="middle" fill="#8A8880" font-family="monospace" font-size="12">A</text>
  <text x="400" y="530" text-anchor="middle" fill="#8A8880" font-family="monospace" font-size="12">B</text>
  <text x="580" y="530" text-anchor="middle" fill="#8A8880" font-family="monospace" font-size="12">C</text>
  <text x="400" y="570" text-anchor="middle" fill="#4A90D9" font-family="monospace" font-size="8">⑮ BACK FRAME (BASE ASSEMBLY)</text>

  <!-- Callout numbers -->
  <circle cx="160" cy="140" r="10" fill="rgba(10,20,40,0.88)" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="160" y="144" text-anchor="middle" fill="#4A90D9" font-family="monospace" font-size="8" font-weight="bold">1</text>
  <circle cx="400" cy="140" r="10" fill="rgba(10,20,40,0.88)" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="400" y="144" text-anchor="middle" fill="#4A90D9" font-family="monospace" font-size="8" font-weight="bold">2</text>
  <circle cx="640" cy="140" r="10" fill="rgba(10,20,40,0.88)" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="640" y="144" text-anchor="middle" fill="#4A90D9" font-family="monospace" font-size="8" font-weight="bold">3</text>

  <!-- Border decoration -->
  <rect x="10" y="10" width="780" height="580" fill="none" stroke="#1E3A5F" stroke-width="1" stroke-dasharray="8,4"/>
</svg>
