<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#0A1628"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="#1E3A5F" stroke-width="2"/>

  <!-- Blueprint grid -->
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0D2040" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid2" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="#142840" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#grid)"/>
  <rect width="800" height="600" fill="url(#grid2)"/>

  <!-- Title block -->
  <rect x="20" y="20" width="760" height="50" fill="none" stroke="#1E4A8A" stroke-width="1"/>
  <text x="400" y="40" text-anchor="middle" fill="#4A90D9" font-family="monospace" font-size="14" font-weight="bold">GE AK-25 / AK-50 LOW-VOLTAGE POWER CIRCUIT BREAKER</text>
  <text x="400" y="58" text-anchor="middle" fill="#3A7ABF" font-family="monospace" font-size="10">EXPLODED ASSEMBLY VIEW — REF: GEI-50299 / GEK-7303C</text>

  <!-- ARC QUENCHERS (top row) -->
  <g opacity="0.9">
    <rect x="120" y="90" width="80" height="100" rx="3" fill="#1A1A1A" stroke="#4A90D9" stroke-width="1.5"/>
    <rect x="123" y="93" width="10" height="94" rx="1" fill="#3A2010" stroke="#5A4030" stroke-width="0.5"/>
    <rect x="187" y="93" width="10" height="94" rx="1" fill="#3A2010" stroke="#5A4030" stroke-width="0.5"/>
    <rect x="120" y="90" width="80" height="14" rx="3" fill="#282828" stroke="#4A90D9" stroke-width="0.8"/>
    <!-- Splitter plates -->
    <line x1="135" y1="108" x2="155" y2="108" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="165" y1="108" x2="185" y2="108" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="135" y1="118" x2="155" y2="118" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="165" y1="118" x2="185" y2="118" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="135" y1="128" x2="155" y2="128" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="165" y1="128" x2="185" y2="128" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="135" y1="138" x2="155" y2="138" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="165" y1="138" x2="185" y2="138" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="135" y1="148" x2="155" y2="148" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="165" y1="148" x2="185" y2="148" stroke="#6A6A6A" stroke-width="4"/>
    <text x="160" y="200" text-anchor="middle" fill="#4A90D9" font-family="monospace" font-size="8">① ARC CHUTE Ph.A</text>

    <rect x="360" y="90" width="80" height="100" rx="3" fill="#1A1A1A" stroke="#4A90D9" stroke-width="1.5"/>
    <rect x="363" y="93" width="10" height="94" rx="1" fill="#3A2010" stroke="#5A4030" stroke-width="0.5"/>
    <rect x="427" y="93" width="10" height="94" rx="1" fill="#3A2010" stroke="#5A4030" stroke-width="0.5"/>
    <rect x="360" y="90" width="80" height="14" rx="3" fill="#282828" stroke="#4A90D9" stroke-width="0.8"/>
    <line x1="375" y1="108" x2="395" y2="108" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="405" y1="108" x2="425" y2="108" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="375" y1="118" x2="395" y2="118" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="405" y1="118" x2="425" y2="118" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="375" y1="128" x2="395" y2="128" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="405" y1="128" x2="425" y2="128" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="375" y1="138" x2="395" y2="138" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="405" y1="138" x2="425" y2="138" stroke="#6A6A6A" stroke-width="4"/>
    <text x="400" y="200" text-anchor="middle" fill="#4A90D9" font-family="monospace" font-size="8">② ARC CHUTE Ph.B</text>

    <rect x="600" y="90" width="80" height="100" rx="3" fill="#1A1A1A" stroke="#4A90D9" stroke-width="1.5"/>
    <rect x="603" y="93" width="10" height="94" rx="1" fill="#3A2010" stroke="#5A4030" stroke-width="0.5"/>
    <rect x="667" y="93" width="10" height="94" rx="1" fill="#3A2010" stroke="#5A4030" stroke-width="0.5"/>
    <rect x="600" y="90" width="80" height="14" rx="3" fill="#282828" stroke="#4A90D9" stroke-width="0.8"/>
    <line x1="615" y1="108" x2="635" y2="108" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="645" y1="108" x2="665" y2="108" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="615" y1="118" x2="635" y2="118" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="645" y1="118" x2="665" y2="118" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="615" y1="128" x2="635" y2="128" stroke="#6A6A6A" stroke-width="4"/>
    <line x1="645" y1="128" x2="665" y2="128" stroke="#6A6A6A" stroke-width="4"/>
