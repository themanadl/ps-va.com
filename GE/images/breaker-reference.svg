    <text x="85" y="252" text-anchor="middle" fill="#333" font-family="monospace" font-size="5">LOW VOLTAGE POWER C.B.</text>
    <!-- Springs -->
    <ellipse cx="55" cy="280" rx="14" ry="3" fill="none" stroke="#B0B0B0" stroke-width="1.5"/>
    <ellipse cx="55" cy="290" rx="14" ry="3" fill="none" stroke="#B0B0B0" stroke-width="1.5"/>
    <ellipse cx="55" cy="300" rx="14" ry="3" fill="none" stroke="#B0B0B0" stroke-width="1.5"/>
    <ellipse cx="55" cy="310" rx="14" ry="3" fill="none" stroke="#B0B0B0" stroke-width="1.5"/>
    <ellipse cx="115" cy="280" rx="14" ry="3" fill="none" stroke="#B0B0B0" stroke-width="1.5"/>
    <ellipse cx="115" cy="290" rx="14" ry="3" fill="none" stroke="#B0B0B0" stroke-width="1.5"/>
    <ellipse cx="115" cy="300" rx="14" ry="3" fill="none" stroke="#B0B0B0" stroke-width="1.5"/>
    <ellipse cx="115" cy="310" rx="14" ry="3" fill="none" stroke="#B0B0B0" stroke-width="1.5"/>
